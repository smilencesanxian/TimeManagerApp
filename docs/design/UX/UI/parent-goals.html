<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeManager - 家长端 - 目标管理</title>
    <style>
        :root {
            --color-primary: #6366F1;
            --color-success: #22C55E;
            --color-bg: #F8FAFC;
            --color-surface: #FFFFFF;
            --color-border: #E2E8F0;
            --color-text-primary: #1E293B;
            --color-text-secondary: #64748B;
            --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background: var(--color-bg); min-height: 100vh; }

        .app-container { max-width: 414px; margin: 0 auto; min-height: 100vh; background: var(--color-bg); display: flex; flex-direction: column; }

        /* 头部 */
        .header {
            height: 56px;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-title { font-size: 18px; font-weight: 600; flex: 1; }

        .add-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--color-primary);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 内容区 */
        .content { flex: 1; padding: 16px; overflow-y: auto; }

        /* 进行中目标 */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text-secondary);
        }

        .section-count {
            font-size: 14px;
            color: var(--color-text-tertiary);
        }

        /* 目标卡片 */
        .goal-card {
            background: var(--color-surface);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .goal-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .goal-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .goal-info { flex: 1; }
        .goal-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .goal-deadline { font-size: 13px; color: var(--color-text-secondary); }

        .goal-menu {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--color-text-tertiary);
            font-size: 18px;
        }

        .goal-progress { margin-bottom: 12px; }

        .progress-bar-bg {
            height: 10px;
            background: var(--color-border);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366F1, #8B5CF6);
            border-radius: 5px;
            transition: width 0.3s;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .goal-actions {
            display: flex;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
        }

        .goal-btn {
            flex: 1;
            height: 40px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            border-radius: 10px;
            font-size: 14px;
            color: var(--color-text-primary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .goal-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }

        .goal-btn-primary {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .goal-btn-primary:hover { background: #4F46E5; }

        /* 里程碑 */
        .milestone-list {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
        }

        .milestone-title {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: 12px;
        }

        .milestone-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
        }

        .milestone-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--color-success);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }

        .milestone-check.pending {
            background: var(--color-border);
        }

        .milestone-text {
            flex: 1;
            font-size: 14px;
        }

        .milestone-text.completed { color: var(--color-text-secondary); text-decoration: line-through; }

        /* 已完成目标 */
        .completed-section { margin-top: 32px; }

        .completed-card {
            background: var(--color-surface);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0.7;
        }

        .completed-icon {
            width: 40px;
            height: 40px;
            background: #DCFCE7;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .completed-info { flex: 1; }
        .completed-name { font-size: 15px; font-weight: 500; }
        .completed-date { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }

        .completed-badge {
            padding: 6px 12px;
            background: var(--color-success);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        /* 新建目标弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 100;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--color-surface);
            width: 100%;
            max-width: 414px;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }

        .form-group { margin-bottom: 20px; }
        .form-label { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 8px; display: block; }

        .form-input {
            width: 100%;
            height: 48px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 0 16px;
            font-size: 16px;
            font-family: inherit;
        }

        .form-input:focus { outline: none; border-color: var(--color-primary); }

        .form-select {
            width: 100%;
            height: 48px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 0 16px;
            font-size: 16px;
            font-family: inherit;
            background: var(--color-surface);
        }

        .type-options {
            display: flex;
            gap: 12px;
        }

        .type-option {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
        }

        .type-option:hover, .type-option.selected {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
        }

        .type-option-icon { font-size: 24px; margin-bottom: 4px; }
        .type-option-text { font-size: 13px; }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-btn {
            flex: 1;
            height: 48px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-btn-secondary { background: var(--color-bg); color: var(--color-text-primary); }
        .modal-btn-primary { background: var(--color-primary); color: white; }

        /* 底部导航 */
        .bottom-nav {
            height: 64px;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 16px;
            text-decoration: none;
            color: inherit;
        }

        .nav-item-icon { font-size: 24px; color: var(--color-text-tertiary); }
        .nav-item-text { font-size: 10px; color: var(--color-text-tertiary); }
        .nav-item.active .nav-item-icon, .nav-item.active .nav-item-text { color: var(--color-primary); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1 class="header-title">目标管理</h1>
            <button class="add-btn" onclick="showModal()">+</button>
        </header>

        <div class="content">
            <!-- 进行中目标 -->
            <div class="section-header">
                <span class="section-title">进行中</span>
                <span class="section-count">2个目标</span>
            </div>

            <div class="goal-card">
                <div class="goal-header">
                    <div class="goal-icon">🎯</div>
                    <div class="goal-info">
                        <div class="goal-name">PET考试优秀</div>
                        <div class="goal-deadline">截止: 2026年6月30日 · 还剩107天</div>
                    </div>
                    <button class="goal-menu">⋮</button>
                </div>

                <div class="goal-progress">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 40%;"></div>
                    </div>
                    <div class="progress-text"
                        <span>已完成 4/10 个单元</span>
                        <span>40%</span>
                    </div>
                </div>

                <div class="milestone-list">
                    <div class="milestone-title">阶段目标</div>
                    <div class="milestone-item">
                        <div class="milestone-check">✓</div>
                        <span class="milestone-text completed">完成词汇积累（1000词）</span>
                    </div>
                    <div class="milestone-item">
                        <div class="milestone-check">✓</div>
                        <span class="milestone-text completed">语法专项训练</span>
                    </div>
                    <div class="milestone-item">
                        <div class="milestone-check pending"></div>
                        <span class="milestone-text">阅读理解强化</span>
                    </div>
                </div>

                <div class="goal-actions">
                    <button class="goal-btn">查看详情</button>
                    <button class="goal-btn goal-btn-primary">生成计划</button>
                </div>
            </div>

            <div class="goal-card">
                <div class="goal-header">
                    <div class="goal-icon" style="background: linear-gradient(135deg, #22C55E 0%, #16A34A 100%);">📚</div>
                    <div class="goal-info">
                        <div class="goal-name">期末数学95分</div>
                        <div class="goal-deadline">截止: 2026年6月28日 · 还剩105天</div>
                    </div>
                    <button class="goal-menu">⋮</button>
                </div>

                <div class="goal-progress">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 65%; background: linear-gradient(90deg, #22C55E, #16A34A);"></div>
                    </div>
                    <div class="progress-text">
                        <span>当前成绩: 88分</span>
                        <span>65%</span>
                    </div>
                </div>

                <div class="goal-actions">
                    <button class="goal-btn">查看详情</button>
                    <button class="goal-btn goal-btn-primary">更新进度</button>
                </div>
            </div>

            <!-- 已完成目标 -->
            <div class="completed-section">
                <div class="section-header">
                    <span class="section-title">已完成</span>
                    <span class="section-count">1个目标</span>
                </div>

                <div class="completed-card">
                    <div class="completed-icon">🏆</div>
                    <div class="completed-info">
                        <div class="completed-name">期中考试班级前10</div>
                        <div class="completed-date">完成于 2026年3月1日</div>
                    </div>
                    <span class="completed-badge">已完成</span>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <a href="parent-dashboard.html" class="nav-item">
                <span class="nav-item-icon">🏠</span>
                <span class="nav-item-text">首页</span>
            </a>
            <a href="parent-create-plan.html" class="nav-item">
                <span class="nav-item-icon">📋</span>
                <span class="nav-item-text">计划</span>
            </a>
            <a href="parent-statistics.html" class="nav-item">
                <span class="nav-item-icon">📊</span>
                <span class="nav-item-text">统计</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-item-icon">👤</span>
                <span class="nav-item-text">我的</span>
            </a>
        </nav>
    </div>

    <!-- 新建目标弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 class="modal-title">新建目标</h3>

            <div class="form-group">
                <label class="form-label">目标内容</label>
                <input type="text" class="form-input" placeholder="例如：英语达到优秀等级">
            </div>

            <div class="form-group">
                <label class="form-label">目标类型</label>
                <div class="type-options">
                    <div class="type-option selected" onclick="selectType(this)">
                        <div class="type-option-icon">📅</div>
                        <div class="type-option-text">短期(周/月)</div>
                    </div>
                    <div class="type-option" onclick="selectType(this)">
                        <div class="type-option-icon">📆</div>
                        <div class="type-option-text">长期(学期/年)</div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">截止日期</label>
                <input type="date" class="form-input" value="2026-06-30">
            </div>

            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" onclick="hideModal()">取消</button>
                <button class="modal-btn modal-btn-primary" onclick="createGoal()">创建目标</button>
            </div>
        </div>
    </div>

    <script>
        function showModal() {
            document.getElementById('modal').classList.add('active');
        }

        function hideModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function selectType(el) {
            document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }

        function createGoal() {
            hideModal();
            alert('目标创建成功！');
        }
    </script>
</body>
</html>
