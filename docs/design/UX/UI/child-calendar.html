<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeManager - 孩子端 - 任务日历</title>
    <style>
        :root {
            --color-primary: #6366F1;
            --color-success: #22C55E;
            --color-star: #FBBF24;
            --color-bg: #F8FAFC;
            --color-surface: #FFFFFF;
            --color-border: #E2E8F0;
            --color-text-primary: #1E293B;
            --color-text-secondary: #64748B;
            --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background: var(--color-bg); height: 100vh; overflow: hidden; }

        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 1200px; margin: 0 auto; }

        /* 头部 */
        .header {
            height: 64px;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .back-btn:hover { background: var(--color-bg); }

        .header-title { font-size: 20px; font-weight: 600; flex: 1; }

        /* 内容区 */
        .content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* 月份导航 */
        .month-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            margin-bottom: 24px;
        }

        .month-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--color-surface);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.15s;
        }
        .month-btn:hover { background: var(--color-primary); color: white; }

        .month-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        /* 日历 */
        .calendar-card {
            background: var(--color-surface);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .day-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-secondary);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            min-height: 70px;
        }

        .calendar-day:hover { background: var(--color-bg); }
        .calendar-day.today { background: var(--color-primary); color: white; }
        .calendar-day.today .day-star { color: rgba(255,255,255,0.9); }
        .calendar-day.selected { box-shadow: 0 0 0 2px var(--color-primary); }
        .calendar-day.other-month { opacity: 0.3; }

        .day-number {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .day-star {
            font-size: 14px;
            color: var(--color-star);
        }

        .day-dot {
            width: 6px;
            height: 6px;
            background: var(--color-success);
            border-radius: 50%;
            position: absolute;
            bottom: 8px;
        }

        /* 选中日期详情 */
        .day-detail {
            background: var(--color-surface);
            border-radius: 20px;
            padding: 24px;
            margin-top: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .detail-date {
            font-size: 18px;
            font-weight: 600;
        }

        .detail-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: #F0FDF4;
            color: var(--color-success);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--color-bg);
            border-radius: 12px;
        }

        .task-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #DBEAFE;
        }

        .task-info { flex: 1; }
        .task-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
        .task-time { font-size: 13px; color: var(--color-text-secondary); }
        .task-status { font-size: 20px; }

        .detail-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--color-border);
        }

        .summary-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-icon { font-size: 20px; }
        .summary-text { font-size: 14px; color: var(--color-text-secondary); }
        .summary-value { font-size: 18px; font-weight: 600; margin-left: 4px; }

        /* 底部导航 */
        .bottom-nav {
            height: 70px;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 24px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.15s;
            text-decoration: none;
            color: inherit;
        }

        .nav-item:hover { background: var(--color-bg); }
        .nav-item.active { color: var(--color-primary); }

        .nav-item-icon { font-size: 24px; }
        .nav-item-text { font-size: 12px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1 class="header-title">任务日历</h1>
        </header>

        <div class="content">
            <div class="month-nav">
                <button class="month-btn">◀</button>
                <span class="month-title">2026年3月</span>
                <button class="month-btn">▶</button>
            </div>

            <div class="calendar-card">
                <div class="calendar-header">
                    <div class="day-label">日</div>
                    <div class="day-label">一</div>
                    <div class="day-label">二</div>
                    <div class="day-label">三</div>
                    <div class="day-label">四</div>
                    <div class="day-label">五</div>
                    <div class="day-label">六</div>
                </div>
                <div class="calendar-grid">
                    <div class="calendar-day other-month"><span class="day-number">23</span></div>
                    <div class="calendar-day other-month"><span class="day-number">24</span></div>
                    <div class="calendar-day other-month"><span class="day-number">25</span></div>
                    <div class="calendar-day other-month"><span class="day-number">26</span></div>
                    <div class="calendar-day other-month"><span class="day-number">27</span></div>
                    <div class="calendar-day other-month"><span class="day-number">28</span></div>
                    <div class="calendar-day"><span class="day-number">1</span></div>
                    <div class="calendar-day"><span class="day-number">2</span></div>
                    <div class="calendar-day"><span class="day-number">3</span></div>
                    <div class="calendar-day"><span class="day-number">4</span></div>
                    <div class="calendar-day"><span class="day-number">5</span></div>
                    <div class="calendar-day"><span class="day-number">6</span><span class="day-star">⭐</span></div>
                    <div class="calendar-day"><span class="day-number">7</span></div>
                    <div class="calendar-day"><span class="day-number">8</span><span class="day-star">⭐</span></div>
                    <div class="calendar-day"><span class="day-number">9</span></div>
                    <div class="calendar-day"><span class="day-number">10</span></div>
                    <div class="calendar-day"><span class="day-number">11</span><span class="day-star">⭐⭐</span></div>
                    <div class="calendar-day"><span class="day-number">12</span></div>
                    <div class="calendar-day"><span class="day-number">13</span></div>
                    <div class="calendar-day selected"><span class="day-number">14</span><span class="day-star">⭐⭐</span></div>
                    <div class="calendar-day today"><span class="day-number">15</span></div>
                    <div class="calendar-day"><span class="day-number">16</span></div>
                    <div class="calendar-day"><span class="day-number">17</span></div>
                    <div class="calendar-day"><span class="day-number">18</span></div>
                    <div class="calendar-day"><span class="day-number">19</span></div>
                    <div class="calendar-day"><span class="day-number">20</span></div>
                    <div class="calendar-day"><span class="day-number">21</span></div>
                    <div class="calendar-day"><span class="day-number">22</span></div>
                </div>
            </div>

            <div class="day-detail">
                <div class="detail-header">
                    <span class="detail-date">3月14日 周五</span>
                    <span class="detail-status">✓ 任务已完成</span>
                </div>

                <div class="task-list">
                    <div class="task-item">
                        <div class="task-icon">📐</div>
                        <div class="task-info">
                            <div class="task-name">数学作业 - 练习册P25-28</div>
                            <div class="task-time">⏱️ 25分钟 · 18:30-18:55</div>
                        </div>
                        <span class="task-status">✅</span>
                    </div>

                    <div class="task-item">
                        <div class="task-icon" style="background: #DCFCE7;">📘</div>
                        <div class="task-info">
                            <div class="task-name">语文背诵 - 古诗二首</div>
                            <div class="task-time">⏱️ 15分钟 · 19:00-19:15</div>
                        </div>
                        <span class="task-status">✅</span>
                    </div>

                    <div class="task-item">
                        <div class="task-icon" style="background: #FEF3C7;">🔤</div>
                        <div class="task-info">
                            <div class="task-name">英语单词 - Unit 3</div>
                            <div class="task-time">⏱️ 20分钟 · 未开始</div>
                        </div>
                        <span class="task-status">❌</span>
                    </div>
                </div>

                <div class="detail-summary">
                    <div class="summary-item">
                        <span class="summary-icon">🍅</span>
                        <span class="summary-text">完成番茄</span>
                        <span class="summary-value">2个</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-icon">⭐</span>
                        <span class="summary-text">获得星星</span>
                        <span class="summary-value">2颗</span>
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="child-today-tasks.html" class="nav-item">
                <span class="nav-item-icon">📋</span>
                <span class="nav-item-text">任务</span>
            </a>
            <a href="child-calendar.html" class="nav-item active">
                <span class="nav-item-icon">📅</span>
                <span class="nav-item-text">日历</span>
            </a>
            <a href="child-achievements.html" class="nav-item">
                <span class="nav-item-icon">🏆</span>
                <span class="nav-item-text">成就</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-item-icon">⚙️</span>
                <span class="nav-item-text">设置</span>
            </a>
        </nav>
    </div>

    <script>
        document.querySelectorAll('.calendar-day').forEach(day => {
            day.addEventListener('click', function() {
                document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        function switchToParent() {
            if (confirm('需要家长验证才能切换到家长模式。是否继续？')) {
                window.location.href = 'parent-dashboard.html';
            }
        }
    </script>
</body>
</html>
