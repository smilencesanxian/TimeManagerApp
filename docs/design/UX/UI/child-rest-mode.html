<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeManager - 休息模式</title>
    <style>
        :root {
            --color-eye-care-bg: #FFF8E7;
            --color-eye-care-text: #8B7355;
            --color-eye-care-accent: #D4A574;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
            background: var(--color-eye-care-bg);
            color: var(--color-eye-care-text);
            height: 100vh;
            overflow: hidden;
        }

        .rest-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        /* 云朵动画背景 */
        .clouds {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            font-size: 60px;
            opacity: 0.3;
            animation: float-cloud 20s linear infinite;
        }

        .cloud:nth-child(1) { top: 10%; left: -10%; animation-delay: 0s; }
        .cloud:nth-child(2) { top: 30%; left: -10%; animation-delay: 5s; }
        .cloud:nth-child(3) { top: 60%; left: -10%; animation-delay: 10s; }

        @keyframes float-cloud {
            from { transform: translateX(0); }
            to { transform: translateX(calc(100vw + 100px)); }
        }

        /* 模式标签 */
        .mode-badge {
            position: absolute;
            top: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(212, 165, 116, 0.2);
            border-radius: 20px;
            font-size: 14px;
        }

        .mode-icon { font-size: 16px; }

        /* 主内容 */
        .rest-content {
            text-align: center;
            z-index: 10;
        }

        .rest-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .rest-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--color-eye-care-text);
        }

        /* 倒计时 */
        .rest-timer {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid var(--color-eye-care-accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            position: relative;
        }

        .timer-ring {
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--color-eye-care-text);
            animation: spin 5s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .timer-value {
            font-size: 48px;
            font-weight: 700;
            font-family: "SF Mono", monospace;
            color: var(--color-eye-care-text);
        }

        .timer-label {
            font-size: 14px;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* 护眼提示 */
        .eye-care-tips {
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            margin-bottom: 40px;
        }

        .tips-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .tip-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            font-size: 15px;
            line-height: 1.5;
        }

        .tip-icon { font-size: 20px; }

        /* 音乐控制 */
        .music-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding: 12px 24px;
            background: rgba(212, 165, 116, 0.2);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .music-control:hover {
            background: rgba(212, 165, 116, 0.3);
        }

        .music-icon { font-size: 20px; }
        .music-text { font-size: 14px; }
        .music-status { font-size: 12px; opacity: 0.7; }

        /* 继续按钮 */
        .continue-btn {
            padding: 16px 48px;
            background: var(--color-eye-care-text);
            color: var(--color-eye-care-bg);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.5;
            pointer-events: none;
        }

        .continue-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .continue-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.3);
        }

        /* 跳过按钮 */
        .skip-btn {
            margin-top: 20px;
            padding: 10px 24px;
            background: transparent;
            border: 1px solid var(--color-eye-care-accent);
            color: var(--color-eye-care-text);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .skip-btn:hover { opacity: 1; }

        /* 底部提示 */
        .bottom-hint {
            position: absolute;
            bottom: 40px;
            font-size: 13px;
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="rest-container">
        <!-- 云朵背景 -->
        <div class="clouds">
            <div class="cloud">☁️</div>
            <div class="cloud">☁️</div>
            <div class="cloud">☁️</div>
        </div>

        <!-- 模式标签 -->
        <div class="mode-badge">
            <span class="mode-icon">🌙</span>
            <span>护眼模式已开启</span>
        </div>

        <!-- 主内容 -->
        <div class="rest-content">
            <div class="rest-icon">😌</div>
            <h1 class="rest-title">休息时间</h1>

            <div class="rest-timer">
                <div class="timer-ring"></div>
                <div class="timer-value" id="timer">05:00</div>
                <div class="timer-label">剩余时间</div>
            </div>

            <div class="eye-care-tips">
                <div class="tips-title">
                    <span>💡</span>
                    <span>护眼小贴士</span>
                </div>
                <div class="tip-item">
                    <span class="tip-icon">👀</span>
                    <span>远眺窗外，让眼睛看看远处的绿色</span>
                </div>
                <div class="tip-item">
                    <span class="tip-icon">💪</span>
                    <span>站起来活动一下，伸展四肢</span>
                </div>
                <div class="tip-item">
                    <span class="tip-icon">💧</span>
                    <span>眨眨眼，保持眼睛湿润</span>
                </div>
            </div>

            <div class="music-control" id="musicBtn" onclick="toggleMusic()">
                <span class="music-icon" id="musicIcon">🎵</span>
                <span class="music-text">轻柔音乐</span>
                <span class="music-status" id="musicStatus">播放中</span>
            </div>

            <button class="continue-btn" id="continueBtn" onclick="continueTask()">
                继续任务
            </button>

            <button class="skip-btn" onclick="skipRest()">跳过休息</button>
        </div>

        <div class="bottom-hint">
            休息是为了更好地学习，让大脑充充电吧～
        </div>
    </div>

    <script>
        let timeLeft = 300; // 5分钟
        let isPlaying = true;
        const timerEl = document.getElementById('timer');
        const continueBtn = document.getElementById('continueBtn');
        const musicIcon = document.getElementById('musicIcon');
        const musicStatus = document.getElementById('musicStatus');

        // 倒计时
        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if (timeLeft > 0) {
                timeLeft--;
                setTimeout(updateTimer, 1000);
            } else {
                timerEl.textContent = "00:00";
                continueBtn.classList.add('active');
                continueBtn.textContent = "休息结束，继续学习";
                // 播放提示音
                playNotification();
            }
        }

        // 播放提示音（模拟）
        function playNotification() {
            console.log('播放休息结束提示音');
        }

        // 切换音乐
        function toggleMusic() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                musicIcon.textContent = '🎵';
                musicStatus.textContent = '播放中';
            } else {
                musicIcon.textContent = '🔇';
                musicStatus.textContent = '已暂停';
            }
        }

        // 继续任务
        function continueTask() {
            if (timeLeft === 0) {
                window.location.href = 'child-today-tasks.html';
            }
        }

        // 跳过休息
        function skipRest() {
            if (confirm('确定要跳过休息吗？适当休息有助于提高学习效率哦～')) {
                window.location.href = 'child-today-tasks.html';
            }
        }

        // 启动倒计时
        updateTimer();
    </script>
</body>
</html>
