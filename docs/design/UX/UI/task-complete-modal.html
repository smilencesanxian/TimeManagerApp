<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeManager - 任务完成</title>
    <style>
        :root {
            --color-primary: #6366F1;
            --color-success: #22C55E;
            --color-warning: #F59E0B;
            --color-bg: #F8FAFC;
            --color-surface: #FFFFFF;
            --color-border: #E2E8F0;
            --color-text-primary: #1E293B;
            --color-text-secondary: #64748B;
            --color-text-tertiary: #94A3B8;
            
            --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            --font-mono: "SF Mono", "Consolas", monospace;
            
            --radius-lg: 12px;
            --radius-xl: 16px;
            --shadow-modal: 0 20px 40px rgba(0,0,0,0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: rgba(0,0,0,0.5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 庆祝动画背景 */
        .celebration-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            font-size: 24px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }

        /* 弹窗容器 */
        .modal {
            background: var(--color-surface);
            border-radius: 20px;
            width: 100%;
            max-width: 560px;
            padding: 40px;
            box-shadow: var(--shadow-modal);
            position: relative;
            z-index: 10;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 头部庆祝区 */
        .modal-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .celebration-icon {
            font-size: 64px;
            margin-bottom: 16px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .modal-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        /* 统计信息 */
        .stats {
            text-align: center;
            margin-bottom: 24px;
        }

        .stat-row {
            font-size: 16px;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        /* 推荐任务区 */
        .suggestion-section {
            border-top: 1px solid var(--color-border);
            padding-top: 24px;
            margin-bottom: 24px;
        }

        .suggestion-text {
            font-size: 16px;
            font-weight: 500;
            color: var(--color-text-primary);
            text-align: center;
            margin-bottom: 20px;
        }

        .suggestion-card {
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 20px;
            transition: all 0.2s ease;
        }

        .suggestion-card:hover {
            border-color: var(--color-primary);
        }

        .suggestion-task {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .suggestion-icon {
            width: 40px;
            height: 40px;
            background: #DCFCE7;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .suggestion-info {
            flex: 1;
        }

        .suggestion-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--color-text-primary);
            margin-bottom: 4px;
        }

        .suggestion-meta {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        .match-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--color-success);
            background: #F0FDF4;
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* 按钮 */
        .btn-primary {
            width: 100%;
            height: 48px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: 16px;
            font-weight: 600;
            font-family: var(--font-family);
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.15s ease;
        }

        .btn-primary:hover {
            background: #4F46E5;
        }

        .btn-text {
            width: 100%;
            height: 40px;
            background: transparent;
            color: var(--color-text-secondary);
            border: none;
            font-size: 16px;
            font-family: var(--font-family);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-text:hover {
            color: var(--color-text-primary);
        }

        /* 倒计时 */
        .countdown {
            text-align: center;
            margin-top: 20px;
        }

        .countdown-text {
            font-size: 14px;
            color: var(--color-text-tertiary);
            margin-bottom: 8px;
        }

        .countdown-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-primary);
            transition: all 0.3s ease;
        }

        .dot.inactive {
            background: #CBD5E1;
        }
    </style>
</head>
<body>
    <!-- 庆祝动画背景 -->
    <div class="celebration-bg">
        <div class="star" style="top: 10%; left: 10%; animation-delay: 0s;">⭐</div>
        <div class="star" style="top: 20%; right: 15%; animation-delay: 0.5s;">✨</div>
        <div class="star" style="top: 60%; left: 5%; animation-delay: 1s;">🌟</div>
        <div class="star" style="top: 70%; right: 10%; animation-delay: 1.5s;">⭐</div>
        <div class="star" style="top: 40%; left: 15%; animation-delay: 0.3s;">✨</div>
    </div>

    <!-- 弹窗 -->
    <div class="modal">
        <div class="modal-header">
            <div class="celebration-icon">🎉</div>
            <h2 class="modal-title">任务完成！</h2>
        </div>

        <div class="stats">
            <div class="stat-row">
                本次专注: <span class="stat-value">18分钟</span>
            </div>
            <div class="stat-row">
                番茄钟还剩: <span class="stat-value" style="color: var(--color-success);">7分钟</span>
            </div>
        </div>

        <div class="suggestion-section">
            <p class="suggestion-text">"还剩7分钟，要不要再来一项？"</p>

            <div class="suggestion-card">
                <div class="suggestion-task">
                    <div class="suggestion-icon">📘</div>
                    <div class="suggestion-info">
                        <div class="suggestion-name">语文背诵</div>
                        <div class="suggestion-meta">
                            预计5分钟 
                            <span class="match-badge">
                                ✓ 时间匹配
                            </span>
                        </div>
                    </div>
                </div>
                <button class="btn-primary">开始这项任务</button>
            </div>
        </div>

        <button class="btn-text">不用了，休息</button>

        <div class="countdown">
            <div class="countdown-text">1分钟后自动停止</div>
            <div class="countdown-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot inactive"></div>
                <div class="dot inactive"></div>
            </div>
        </div>
    </div>
</body>
</html>
