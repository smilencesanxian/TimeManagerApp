<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeManager - 家长端 - 首页</title>
    <style>
        :root {
            --color-primary: #6366F1;
            --color-success: #22C55E;
            --color-warning: #F59E0B;
            --color-bg: #F8FAFC;
            --color-surface: #FFFFFF;
            --color-border: #E2E8F0;
            --color-text-primary: #1E293B;
            --color-text-secondary: #64748B;
            --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background: var(--color-bg); min-height: 100vh; }

        .app-container { max-width: 414px; margin: 0 auto; min-height: 100vh; background: var(--color-bg); display: flex; flex-direction: column; }

        /* 头部 */
        .header {
            height: 56px;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        .header-title { font-size: 18px; font-weight: 600; flex: 1; }

        .child-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--color-bg);
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        .child-avatar { font-size: 20px; }

        /* 快捷操作 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 16px;
        }

        .quick-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px;
            background: var(--color-surface);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .quick-icon { font-size: 24px; }
        .quick-text { font-size: 12px; color: var(--color-text-primary); }

        /* 内容区 */
        .content { flex: 1; padding: 0 16px 16px; overflow-y: auto; }

        /* 任务列表 */
        .section-card {
            background: var(--color-surface);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-action {
            font-size: 13px;
            color: var(--color-primary);
            cursor: pointer;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--color-bg);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .task-item:last-child { margin-bottom: 0; }
        .task-item.active { border: 2px solid var(--color-primary); }
        .task-item.completed { opacity: 0.6; }

        .task-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #DBEAFE;
        }

        .task-info { flex: 1; }
        .task-name { font-size: 15px; font-weight: 500; }
        .task-meta { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }

        .task-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .task-status.doing { background: #FEF3C7; color: #D97706; }
        .task-status.done { background: #DCFCE7; color: #16A34A; }
        .task-status.todo { background: #F1F5F9; color: var(--color-text-secondary); }

        .task-actions {
            display: flex;
            gap: 4px;
        }

        .task-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
        }

        /* 习惯打卡 */
        .habit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--color-bg);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .habit-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--color-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .habit-checkbox.checked {
            background: var(--color-success);
            border-color: var(--color-success);
            color: white;
            font-size: 14px;
        }

        /* 底部导航 */
        .bottom-nav {
            height: 64px;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 16px;
            text-decoration: none;
            color: var(--color-text-secondary);
        }

        .nav-item.active { color: var(--color-primary); }
        .nav-item-icon { font-size: 24px; }
        .nav-item-text { font-size: 10px; }

        /* 悬浮按钮 */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99,102,241,0.4);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="header">
            <h1 class="header-title">家长控制台</h1>
            <div class="child-selector">
                <span class="child-avatar">👦</span>
                <span>小明</span>
                <span>▼</span>
            </div>
        </header>

        <!-- 快捷操作 -->
        <div class="quick-actions">
            <button class="quick-btn" onclick="location.href='parent-plan-manage.html'">
                <span class="quick-icon">📋</span>
                <span class="quick-text">计划管理</span>
            </button>
            <button class="quick-btn" onclick="location.href='parent-ranking.html'">
                <span class="quick-icon">🏆</span>
                <span class="quick-text">本周评比</span>
            </button>
            <button class="quick-btn" onclick="location.href='parent-statistics.html'">
                <span class="quick-icon">📊</span>
                <span class="quick-text">数据统计</span>
            </button>
            <button class="quick-btn" onclick="location.href='parent-send-message.html'">
                <span class="quick-icon">💬</span>
                <span class="quick-text">发送心语</span>
            </button>
        </div>

        <!-- 内容区 -->
        <div class="content">
            <!-- 今日任务 -->
            <div class="section-card">
                <div class="section-header">
                    <div class="section-title">📚 今日任务</div>
                    <span class="section-action" onclick="location.href='parent-plan-manage.html'">管理 →</span>
                </div>

                <!-- 进行中任务 -->
                <div class="task-item active">
                    <div class="task-icon">📐</div>
                    <div class="task-info">
                        <div class="task-name">数学作业 - 练习册P25-28</div>
                        <div class="task-meta">预计25分钟 · ⏱️ 已进行12分钟</div>
                    </div>
                    <span class="task-status doing">专注中</span>
                </div>

                <!-- 待完成任务 -->
                <div class="task-item">
                    <div class="task-icon" style="background: #DCFCE7;">📘</div>
                    <div class="task-info">
                        <div class="task-name">语文背诵 - 古诗二首</div>
                        <div class="task-meta">预计15分钟</div>
                    </div>
                    <span class="task-status todo">待完成</span>
                    <div class="task-actions">
                        <button class="task-btn">✏️</button>
                        <button class="task-btn">🗑️</button>
                    </div>
                </div>

                <div class="task-item">
                    <div class="task-icon" style="background: #FEF3C7;">🔤</div>
                    <div class="task-info">
                        <div class="task-name">英语单词 - Unit 3</div>
                        <div class="task-meta">预计20分钟</div>
                    </div>
                    <span class="task-status todo">待完成</span>
                    <div class="task-actions">
                        <button class="task-btn">✏️</button>
                        <button class="task-btn">🗑️</button>
                    </div>
                </div>

                <!-- 已完成任务 -->
                <div class="task-item completed">
                    <div class="task-icon" style="background: #F3E8FF;">🎨</div>
                    <div class="task-info">
                        <div class="task-name">美术创作 - 春天的花朵</div>
                        <div class="task-meta">✓ 已完成 · 用时30分钟</div>
                    </div>
                    <span class="task-status done">已完成</span>
                </div>
            </div>

            <!-- 习惯打卡 -->
            <div class="section-card">
                <div class="section-header">
                    <div class="section-title">☑️ 习惯打卡</div>
                    <span class="section-action" onclick="location.href='parent-plan-manage.html'">管理 →</span>
                </div>

                <div class="habit-item">
                    <div class="habit-checkbox checked">✓</div>
                    <div class="task-info">
                        <div class="task-name">🌙 早睡早起</div>
                        <div class="task-meta">连续7天 🔥</div>
                    </div>
                </div>

                <div class="habit-item">
                    <div class="habit-checkbox"></div>
                    <div class="task-info">
                        <div class="task-name">🎒 整理书包</div>
                        <div class="task-meta">连续12天</div>
                    </div>
                </div>

                <div class="habit-item">
                    <div class="habit-checkbox"></div>
                    <div class="task-info">
                        <div class="task-name">🏃 跳绳100个</div>
                        <div class="task-meta">每周3次 · 本周1/3</div>
                    </div>
                </div>
            </div>

            <!-- 今日奖励 -->
            <div class="section-card">
                <div class="section-header">
                    <div class="section-title">⭐ 今日奖励</div>
                </div>
                <div style="display: flex; align-items: center; gap: 16px; padding: 12px; background: var(--color-bg); border-radius: 10px;">
                    <div style="font-size: 32px;">⭐⭐⭐</div>
                    <div style="flex: 1;">
                        <div style="font-size: 15px; font-weight: 500;">已获得 3 颗星星</div>
                        <div style="font-size: 13px; color: var(--color-text-secondary); margin-top: 4px;">再完成2个任务可额外获得1颗</div>
                    </div>
                    <span style="font-size: 20px;">🌙1</span>
                </div>
            </div>
        </div>

        <!-- 悬浮添加按钮 -->
        <button class="fab" onclick="location.href='parent-plan-manage.html'">+</button>

        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <a href="parent-dashboard.html" class="nav-item active">
                <span class="nav-item-icon">🏠</span>
                <span class="nav-item-text">首页</span>
            </a>
            <a href="parent-plan-manage.html" class="nav-item">
                <span class="nav-item-icon">📋</span>
                <span class="nav-item-text">计划</span>
            </a>
            <a href="parent-ranking.html" class="nav-item">
                <span class="nav-item-icon">🏆</span>
                <span class="nav-item-text">评比</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-item-icon">👤</span>
                <span class="nav-item-text">我的</span>
            </a>
        </nav>
    </div>
</body>
</html>
